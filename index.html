<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ranjana Smart Home</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/paho-mqtt/mqttws31.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(270deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);
background-size:800% 800%;
animation:gradientBG 20s ease infinite;
color:white
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.header{text-align:center;padding:20px}

.container{padding:15px}

.card{
background:rgba(255,255,255,0.15);
border-radius:15px;
padding:15px;
margin-bottom:15px
}

.device{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px
}

.device-right{
display:flex;
gap:10px;
align-items:center
}

.switch{
position:relative;
width:40px;
height:22px
}

.switch input{opacity:0}

.slider{
position:absolute;
top:0;left:0;right:0;bottom:0;
background:#ff4d4d;
border-radius:25px
}

.slider:before{
content:"";
position:absolute;
height:18px;width:18px;
left:2px;bottom:2px;
background:white;
border-radius:50%;
transition:.4s
}

input:checked+.slider{background:#00ff99}

input:checked+.slider:before{
transform:translateX(18px)
}

button{
border:none;
border-radius:8px;
padding:6px 10px;
cursor:pointer
}

.allBtn{
background:#1a73e8;
color:white;
margin-right:5px
}

.popup{
display:none;
position:absolute;
background:#000000cc;
padding:15px;
border-radius:10px;
z-index:10
}

.voiceBtn{
position:fixed;
bottom:20px;
right:20px;
background:#7b1fa2;
color:white;
padding:12px 18px;
}

</style>

</head>

<body>

<div class="header">

<h2>Ranjana Smart Home</h2>

WiFi: <span id="wifiName">--</span> |
Signal: <span id="wifiRSSI">--</span> dBm

</div>

<div class="container">

<div class="card">
<h3>Room 1</h3>

<button class="allBtn" onclick="roomAll(1,1)">All ON</button>
<button class="allBtn" onclick="roomAll(1,0)">All OFF</button>

<div id="room1"></div>
</div>

<div class="card">
<h3>Room 2</h3>

<button class="allBtn" onclick="roomAll(2,1)">All ON</button>
<button class="allBtn" onclick="roomAll(2,0)">All OFF</button>

<div id="room2"></div>
</div>

<div class="card">
<h3>Usage Graph</h3>
<canvas id="chart"></canvas>
</div>

</div>

<button class="voiceBtn" onclick="startVoice()">🎤 Voice</button>

<script>

// ===== DEVICE LIST =====

const devices=[
{id:0,name:"Light",room:1},
{id:1,name:"Fan",room:1},
{id:2,name:"Tube",room:1},
{id:3,name:"Socket",room:1},
{id:4,name:"Light",room:2},
{id:5,name:"Fan",room:2},
{id:6,name:"Bulb",room:2},
{id:7,name:"Socket",room:2}
]

// ===== CREATE UI =====

function deviceHTML(d){

return `

<div class="device">

<span>${d.name}</span>

<div class="device-right">

<button onclick="openTimer(${d.id})">⏱</button>
<button onclick="openStats(${d.id})">📊</button>

<label class="switch">
<input type="checkbox" id="relay${d.id}" onchange="sendRelay(${d.id})">
<span class="slider"></span>
</label>

</div>

</div>

`

}

devices.forEach(d=>{

if(d.room===1)
document.getElementById("room1").innerHTML+=deviceHTML(d)

else
document.getElementById("room2").innerHTML+=deviceHTML(d)

})

// ===== MQTT =====

const host="5dba91287f8248c1a30195053d3862ed.s1.eu.hivemq.cloud"

let client=new Paho.MQTT.Client(host,8884,"web_"+Math.random())

client.onMessageArrived=msg=>{

let topic=msg.destinationName
let data

try{data=JSON.parse(msg.payloadString)}catch(e){return}

if(topic==="home/esp32/update"){

let id=data.r
let state=data.s

document.getElementById("relay"+id).checked=state

updateChart(id,data.ud)

}

if(topic==="home/esp32/wifi_status"){

document.getElementById("wifiName").innerText=data.n
document.getElementById("wifiRSSI").innerText=data.r

}

}

client.connect({

userName:"Debarghya_Sannigrahi",
password:"Dsann#5956",
useSSL:true,

onSuccess:()=>{

client.subscribe("home/esp32/update")
client.subscribe("home/esp32/wifi_status")

}

})

// ===== RELAY COMMAND =====

function sendRelay(id){

let state=document.getElementById("relay"+id).checked?1:0

let msg=new Paho.MQTT.Message(JSON.stringify({

r:id,
s:state,
t:0

}))

msg.destinationName="home/esp32/commands"

client.send(msg)

}

// ===== ROOM ALL =====

function roomAll(room,state){

let start=room===1?0:4
let end=room===1?3:7

for(let i=start;i<=end;i++){

document.getElementById("relay"+i).checked=state

let msg=new Paho.MQTT.Message(JSON.stringify({

r:i,
s:state,
t:0

}))

msg.destinationName="home/esp32/commands"

client.send(msg)

}

}

// ===== TIMER POPUP =====

function openTimer(id){

let sec=prompt("Timer seconds")

if(!sec)return

let msg=new Paho.MQTT.Message(JSON.stringify({

r:id,
s:1,
t:parseInt(sec)

}))

msg.destinationName="home/esp32/commands"

client.send(msg)

}

// ===== STATS =====

function openStats(id){

alert("Usage data is shown in graph")

}

// ===== CHART =====

let usage=[0,0,0,0,0,0,0,0]

const chart=new Chart(

document.getElementById("chart"),

{
type:"bar",
data:{
labels:["L1","F1","T1","S1","L2","F2","B2","S2"],
datasets:[{label:"Today Usage (min)",data:usage}]
}
}

)

function updateChart(id,val){

usage[id]=val
chart.update()

}

// ===== VOICE =====

const SpeechRecognition =
window.SpeechRecognition||window.webkitSpeechRecognition

const rec=new SpeechRecognition()

rec.lang="en-US"

function startVoice(){

rec.start()

}

rec.onresult=e=>{

let text=e.results[0][0].transcript.toLowerCase()

text=text.replace("too","two").replace("to","two")

let state=text.includes("off")?0:1

if(text.includes("room one light")) mqttRelay(0,state)
if(text.includes("room one fan")) mqttRelay(1,state)
if(text.includes("room one tube")) mqttRelay(2,state)
if(text.includes("room one socket")) mqttRelay(3,state)

if(text.includes("room two light")) mqttRelay(4,state)
if(text.includes("room two fan")) mqttRelay(5,state)
if(text.includes("room two bulb")) mqttRelay(6,state)
if(text.includes("room two socket")) mqttRelay(7,state)

}

function mqttRelay(id,state){

let msg=new Paho.MQTT.Message(JSON.stringify({

r:id,
s:state,
t:0

}))

msg.destinationName="home/esp32/commands"

client.send(msg)

document.getElementById("relay"+id).checked=state

}

</script>

</body>
  </html>
