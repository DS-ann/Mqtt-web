<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ranjana Smart Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Universal Emoji -->
<script src="https://twemoji.maxcdn.com/v/latest/twemoji.min.js"></script>

<style>

body{
font-family:'Roboto',sans-serif;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

.header{
background:#1e293b;
padding:15px;
margin:10px;
border-radius:12px;
}

.header h2{
font-family:'Poppins',sans-serif;
}

.updateBtn{
background:none;
border:none;
color:#22c55e;
font-size:16px;
cursor:pointer;
margin-left:5px;
}

.room{
background:#1e293b;
margin:15px;
padding:15px;
border-radius:12px;
}

.device{
display:flex;
align-items:center;
justify-content:space-between;
background:#334155;
padding:10px;
margin:8px 0;
border-radius:10px;
transition:0.3s;
}

.device.on{
background:#1e3a2f;
box-shadow:0 0 10px #22c55e;
}

.icon{
font-size:22px;
width:30px;
}

.device.on .fan{
animation:spin 1s linear infinite;
}

.device.on .light{
animation:glow 1.5s infinite alternate;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

@keyframes glow{
from{text-shadow:0 0 5px #fff}
to{text-shadow:0 0 20px yellow}
}

.toggle{
position:relative;
width:50px;
height:26px;
}

.toggle input{display:none;}

.slider{
position:absolute;
cursor:pointer;
background:#64748b;
border-radius:34px;
top:0;
left:0;
right:0;
bottom:0;
}

.slider:before{
position:absolute;
content:"";
height:20px;
width:20px;
left:3px;
bottom:3px;
background:white;
border-radius:50%;
transition:0.3s;
}

input:checked + .slider{
background:#22c55e;
}

input:checked + .slider:before{
transform:translateX(24px);
}

.timerCircle{
width:42px;
height:42px;
border-radius:50%;
background:conic-gradient(#22c55e 0deg,#1e293b 0deg);
display:flex;
align-items:center;
justify-content:center;
font-size:10px;
}

.iconBtn{
background:none;
border:none;
font-size:18px;
color:white;
cursor:pointer;
}

#voicePopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1e293b;
padding:20px 30px;
border-radius:12px;
font-size:20px;
display:none;
z-index:1000;
font-family:Poppins;
}

.mic{
position:fixed;
bottom:30px;
right:30px;
width:60px;
height:60px;
border-radius:50%;
background:#22c55e;
font-size:28px;
border:none;
color:white;
cursor:pointer;
}

.wave{
position:fixed;
bottom:30px;
right:30px;
width:60px;
height:60px;
border-radius:50%;
background:#22c55e;
opacity:0.3;
animation:wave 2s infinite;
display:none;
}

.wave:nth-child(2){animation-delay:0.5s}
.wave:nth-child(3){animation-delay:1s}

@keyframes wave{
0%{transform:scale(1);opacity:0.5}
100%{transform:scale(2.5);opacity:0}
}

</style>

</head>

<body>

<div class="header">

<h2>🏠 Ranjana Smart Home</h2>

MQTT: <span id="mqttStatus">Connecting...</span><br>

WiFi: <span id="wifiSSID">--</span>
Signal: <span id="wifiRSSI">--</span>

<button class="updateBtn" onclick="requestStatus()">🔄</button>

</div>

<div id="rooms"></div>

<h3>Usage Statistics</h3>
<canvas id="usageChart" width="350" height="200"></canvas>

<div id="voicePopup">Listening...</div>

<div class="wave"></div>
<div class="wave"></div>
<div class="wave"></div>

<button class="mic" onclick="startVoice()">🎤</button>

<script>

/* Universal emoji rendering */
twemoji.parse(document.body)

const broker="wss://5dba91287f8248c1a30195053d3862ed.s1.eu.hivemq.cloud:8884/mqtt"

const topicCmd="home/esp32/commands"

const client=mqtt.connect(broker,{
username:"Debarghya_Sannigrahi",
password:"Dsann#5956"
})

let usageData=new Array(8).fill(0)
let timers=new Array(8).fill(0)
let timerTotal=new Array(8).fill(0)

function requestStatus(){
client.publish(topicCmd,"status")
}

/* Voice Engine Upgrade */

let recognition

function startVoice(){

const SpeechRecognition=
window.SpeechRecognition||window.webkitSpeechRecognition

if(!SpeechRecognition){
alert("Voice recognition not supported")
return
}

recognition=new SpeechRecognition()

recognition.lang="en-IN"
recognition.continuous=true
recognition.interimResults=true

let popup=document.getElementById("voicePopup")
let waves=document.querySelectorAll(".wave")

waves.forEach(w=>w.style.display="block")

popup.innerText="🎤 Listening..."
popup.style.display="block"

recognition.start()

recognition.onresult=(e)=>{

let text=""

for(let i=0;i<e.results.length;i++){
text=e.results[i][0].transcript
}

popup.innerText=text

voiceCommand(text.toLowerCase())

}

recognition.onend=()=>{
popup.style.display="none"
waves.forEach(w=>w.style.display="none")
}

}

function speak(t){

let u=new SpeechSynthesisUtterance(t)

u.rate=1
u.pitch=1.1
u.lang="en-IN"

speechSynthesis.speak(u)

}

</script>

</body>
  </html>
