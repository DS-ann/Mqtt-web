<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ranjana's Smart Home</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
header{padding:16px;background:#1e293b;text-align:center;}
.container{padding:14px;}
.room{background:#1e293b;border-radius:16px;padding:14px;margin-bottom:16px;}
.device{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #334155;}
.device:last-child{border-bottom:none;}
.name{font-size:15px;}
.control{display:flex;align-items:center;gap:10px;}
.timer,.usageBtn{cursor:pointer;font-size:18px;user-select:none;}
.time{font-size:12px;color:#94a3b8;}
.switch{position:relative;display:inline-block;width:50px;height:26px;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#475569;transition:.3s;border-radius:30px;}
.slider:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:white;transition:.3s;border-radius:50%;}
input:checked + .slider{background:#22c55e;}
input:checked + .slider:before{transform:translateX(24px);}
.roomButtons{margin-top:12px;display:flex;gap:10px;}
button{flex:1;padding:10px;border:none;border-radius:10px;background:#3b82f6;color:white;}
canvas{background:white;border-radius:12px;margin-top:12px;}
#voiceBtn{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;font-size:26px;}
#voiceText{position:fixed;bottom:90px;right:20px;background:#1e293b;padding:10px;border-radius:8px;display:none;}
</style>
</head>
<body>

<header>
<h2>馃彔 Ranjana's Smart Home</h2>
<div id="mqttState">MQTT connecting...</div>
<div id="wifiInfo">WiFi waiting...</div>
</header>

<div class="container">

<!-- Rooms -->
<div class="room" id="room1">
<h3>Room 1</h3>
<div class="roomButtons">
<button onclick="roomOn(0)">Room 1 ON</button>
<button onclick="roomOff(0)">Room 1 OFF</button>
</div>
</div>

<div class="room" id="room2">
<h3>Room 2</h3>
<div class="roomButtons">
<button onclick="roomOn(4)">Room 2 ON</button>
<button onclick="roomOff(4)">Room 2 OFF</button>
</div>
</div>

<h3>Usage Statistics</h3>
<canvas id="usageChart"></canvas>

</div>

<div id="voiceBtn" onclick="startVoice()">馃帳</div>
<div id="voiceText"></div>

<script>
/* MQTT */
const client = mqtt.connect("wss://5dba91287f8248c1a30195053d3862ed.s1.eu.hivemq.cloud:8884/mqtt",
{username:"Debarghya_Sannigrahi", password:"Dsann#5956"});

let lastESP=Date.now();
let lastCmdTime=0;

client.on("connect",()=>{
  document.getElementById("mqttState").innerText="MQTT Connected";
  client.subscribe("home/esp32/update");
  client.subscribe("home/esp32/wifi_status");
});

client.on("close",()=>{
  document.getElementById("mqttState").innerText="MQTT reconnecting...";
  setTimeout(()=>location.reload(),3000);
});

client.on("message",(topic,msg)=>{
  msg=msg.toString();
  lastESP=Date.now();
  if(topic==="home/esp32/wifi_status") document.getElementById("wifiInfo").innerText=msg;
  if(topic==="home/esp32/update") parseData(msg);
});

/* RELAYS */
const devices=[
  {name:"馃挕 Light", room:0},{name:"馃挕 Tube", room:0},
  {name:"馃寑 Fan", room:0},{name:"馃攲 Socket", room:0},
  {name:"馃挕 Light", room:1},{name:"馃挕 Bulb", room:1},
  {name:"馃寑 Fan", room:1},{name:"馃攲 Socket", room:1}
];

let relayState=[0,0,0,0,0,0,0,0];
let relayTimers=[0,0,0,0,0,0,0,0];
let relayEndTime=[0,0,0,0,0,0,0,0];
let usageData=[0,0,0,0,0,0,0,0];

/* CREATE UI */
function createDeviceUI(){
  devices.forEach((dev,i)=>{
    const roomDiv=document.getElementById(dev.room===0?"room1":"room2");
    const d=document.createElement('div'); d.className='device';
    d.innerHTML=`<div><div class="name">${dev.name}</div><div class="time" id="timer${i}"></div></div>
    <div class="control">
    <span class="timer" onclick="setTimer(${i})">鈴�</span>
    <span class="usageBtn" onclick="showUsage(${i})">鈩癸笍</span>
    <label class="switch"><input type="checkbox" data-id="${i}"><span class="slider"></span></label>
    </div>`;
    roomDiv.appendChild(d);
  });

  document.querySelectorAll("input[type=checkbox]").forEach(el=>{
    el.addEventListener("change",()=>{
      if(Date.now()-lastCmdTime<120) return;
      lastCmdTime=Date.now();
      sendRelay(el.dataset.id,el.checked);
    });
  });
}
createDeviceUI();

/* SEND RELAY */
function sendRelay(id,state){ client.publish("home/esp32/commands", id+(state? "1":"0")); }

/* TIMER */
function setTimer(id){
  let m=prompt("Enter timer in minutes");
  if(!m) return;
  client.publish("home/esp32/commands","T"+id+m);
  relayEndTime[id]=Date.now()+parseInt(m)*60000;
}

/* USAGE */
function showUsage(id){ alert(`Relay ${id+1} total: ${usageData[id]} min`); }

/* PARSER */
function parseData(msg){
  if(msg.length<1) return;
  let startIdx = msg.startsWith("a:")?0:4;

  let r = msg.split(',')[0].substring(1); 
  let parts = msg.split(',');
  let timers=[], usage=[];
  for(let i=0;i<4;i++){
    timers[i]=parseInt((parts[i+1]||"").replace('T',''))||0;
    usage[i]=parseInt((parts[i+5]||"").replace('U',''))||0;
  }

  for(let i=0;i<4;i++){
    let idx = startIdx+i;
    let sw=document.querySelector('input[data-id="'+idx+'"]');
    let newState = r[i]=="1";
    if(sw && sw.checked!==newState) sw.checked=newState;

    relayTimers[idx]=timers[i]*60000;
    relayEndTime[idx]=timers[i]>0 ? Date.now()+timers[i]*60000 : 0;
    document.getElementById("timer"+idx).innerText = timers[i]>0 ? "Timer "+timers[i]+" min" : "";
    usageData[idx]=usage[i];
  }

  chart.data.datasets[0].data = usageData.slice(0,4);
  chart.data.datasets[1].data = usageData.slice(4,8);
  chart.update();
}

/* TIMER COUNTDOWN UPDATE */
setInterval(()=>{
  const now=Date.now();
  relayEndTime.forEach((end,i)=>{
    if(end>0){
      const diff=Math.max(0,end-now);
      const min=Math.floor(diff/60000);
      const sec=Math.floor((diff%60000)/1000);
      document.getElementById("timer"+i).innerText=`Timer ${min}m ${sec}s`;
      if(diff<=0){ relayEndTime[i]=0; document.getElementById("timer"+i).innerText=""; }
    }
  });
},1000);

/* CHART */
const chart=new Chart(document.getElementById("usageChart"),{
  type:"bar",
  data:{
    labels:["R1","R2","R3","R4","R5","R6","R7","R8"],
    datasets:[
      {label:"Room 1", data:usageData.slice(0,4), backgroundColor:"#3b82f6"},
      {label:"Room 2", data:usageData.slice(4,8), backgroundColor:"#22c55e"}
    ]
  },
  options:{
    responsive:true,
    scales:{y:{beginAtZero:true, title:{display:true,text:"Minutes"}}}
  }
});

/* ROOM BUTTONS */
function roomOn(start){ for(let i=start;i<4+start;i++) sendRelay(i,true); }
function roomOff(start){ for(let i=start;i<4+start;i++) sendRelay(i,false); }

/* VOICE */
function startVoice(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){ alert("Voice not supported"); return; }
  const rec=new SpeechRecognition(); rec.start();
  rec.onresult=(e)=>{
    let text=e.results[0][0].transcript.toLowerCase();
    document.getElementById("voiceText").style.display="block";
    document.getElementById("voiceText").innerText=text;
    aiVoice(text);
  }
}

function aiVoice(cmd){
  cmd=cmd.replace(/\s+/g,' ').trim();
  let mapping=[
    {name:"room 1 light",id:0},{name:"room 1 tube",id:1},
    {name:"room 1 fan",id:2},{name:"room 1 socket",id:3},
    {name:"room 2 light",id:4},{name:"room 2 bulb",id:5},
    {name:"room 2 fan",id:6},{name:"room 2 socket",id:7}
  ];
  mapping.forEach(m=>{
    if(cmd.includes(m.name) && cmd.includes("on")) sendRelay(m.id,true);
    if(cmd.includes(m.name) && cmd.includes("off")) sendRelay(m.id,false);
  });
  if(cmd.includes("all on")) relayState.forEach((_,i)=>sendRelay(i,true));
  if(cmd.includes("all off")) relayState.forEach((_,i)=>sendRelay(i,false));
}

/* ESP Offline Watchdog */
setInterval(()=>{
  if(Date.now()-lastESP>60000){
    document.getElementById("mqttState").innerText="ESP Offline";
  }
},5000);

</script>
</body>
</html>
